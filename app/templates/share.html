<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ key.name }} — VPN key</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding: 24px; }
    code { word-break: break-all; }
  </style>
</head>
<body>
  <h3 class="mb-3">🔑 {{ key.name }}</h3>
  <p class="text-muted">Если у вас установлен v2RayTun, нажмите кнопку ниже.</p>

  <a class="btn btn-primary btn-lg" href="{{ deeplink }}">Открыть в v2RayTun</a>

  <hr class="my-4">

  <div class="mb-2"><b>Deep link:</b></div>
  <code id="deeplink">{{ deeplink }}</code>
  <button class="btn btn-sm btn-outline-secondary ms-2" onclick="copyText('deeplink')">Копировать</button>

  <div class="mt-3 mb-2"><b>Raw config:</b></div>
  <code id="raw">{{ raw }}</code>
  <button class="btn btn-sm btn-outline-secondary ms-2" onclick="copyText('raw')">Копировать</button>

  <div class="mt-4 text-muted" style="font-size: 13px;">
    Подсказка: если кнопка не открывает приложение, скопируйте <b>Raw config</b> и импортируйте через Clipboard/QR в v2RayTun.
  </div>

<script>
function copyText(id){
  const el = document.getElementById(id);
  const txt = el.innerText;
  navigator.clipboard.writeText(txt);
}
</script>
</body>
</html>
