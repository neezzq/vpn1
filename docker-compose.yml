version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: vpnshop
      POSTGRES_USER: vpnshop
      POSTGRES_PASSWORD: vpnshop
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  web:
    build: .
    env_file: .env
    depends_on:
      - db
    command: ["uvicorn", "app.web_app:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    restart: unless-stopped

  bot:
    build: .
    env_file: .env
    depends_on:
      - db
    command: ["python", "-m", "app.bot_runner"]
    restart: unless-stopped

volumes:
  pgdata:
